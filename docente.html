<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente | Gestión de Aula</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">

    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-chalkboard-user"></i>
            <span>Maestro Pro</span>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html"><i class="fa-solid fa-house"></i> Inicio</a>
            <a href="#" class="active"><i class="fa-solid fa-layer-group"></i> Mis Proyectos</a>
            <a href="#"><i class="fa-solid fa-users"></i> Mis Alumnos</a>
            <a href="#"><i class="fa-solid fa-chart-line"></i> Seguimiento PDA</a>
            <a href="#" class="nav-logout"><i class="fa-solid fa-right-from-bracket"></i> Salir</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="content-header">
            <div>
                <h1>Gestión de Proyectos</h1>
                <p>Quinto Grado - Ciclo 2025-2026</p>
            </div>
            <div class="user-profile">
                <div class="class-code-badge">
                    <small>CÓDIGO DE CLASE</small>
                    <strong id="codigo-actual">QNT-501</strong>
                </div>
            </div>
        </header>

        <section class="dashboard-grid">
            <div class="card create-post">
                <h2><i class="fa-solid fa-plus"></i> Publicar Nuevo Proyecto</h2>
                <form id="form-publicar">
                    <div class="input-group">
                        <label>Título del Proyecto / PDA</label>
                        <input type="text" id="titulo-tarea" placeholder="Ej: Las culturas mesoamericanas..." required>
                    </div>
                    
                    <div class="input-group">
                        <label>Campo Formativo</label>
                        <select id="campo-formativo">
                            <option value="Lenguajes">Lenguajes</option>
                            <option value="Saberes">Saberes y Pensamiento Científico</option>
                            <option value="Etica">Ética, Naturaleza y Sociedades</option>
                            <option value="Humano">De lo Humano y lo Comunitario</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Instrucciones y Recursos</label>
                        <textarea id="desc-tarea" rows="4" placeholder="Describe las actividades, páginas de Nuestros Saberes y criterios de evaluación..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-paper-plane"></i> Publicar a la Clase
                    </button>
                </form>
            </div>

            <div class="feed-section">
                <h2>Proyectos Activos</h2>
                <div id="lista-tareas-docente" class="feed-container">
                    <div class="empty-state">
                        <i class="fa-solid fa-box-open"></i>
                        <p>No has publicado proyectos aún.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="js/docente-app.js"></script>
</body>
</html>
